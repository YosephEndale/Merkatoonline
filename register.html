                </div>

    <section class="register-section">
        <!-- Registration Form -->
        <div class="register-form">
            <h2>Create an Account</h2>
            <form id="registrationForm" action="http://merkatoonline/Backend_Development/PHP/register.php" method="POST">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your full name" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your Email" required><br><br>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone_number" placeholder="Enter your phone number" required><br><br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password_hash" placeholder="Create your password at least with 8 characters" required><br><br>

                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Can you please confirm your password" required><br><br>

                <!-- Additional fields -->
                <label for="is_seller">Seller:</label>
                <input type="checkbox" id="is_seller" name="is_seller"><br><br>

                <label for="seller_name">Seller Name:</label>
                <input type="text" id="seller_name" name="seller_name" placeholder="Enter unique identifier name"><br><br>

                <label for="business_info">Business Info:</label>
                <textarea id="business_info" name="business_info"></textarea><br><br>

                <button type="submit">Register</button>

                <p>Already have an account? <a href="login.html">Log in</a></p>
            </form>
        </div>
    </section>
